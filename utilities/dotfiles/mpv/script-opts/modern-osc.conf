# Cor de destaque (hex RGB)
#accent_color=#E74C3C

# custom layout
# layout=box
# box_width=0.6
# box_alpha=80

# Tempo antes de esconder o OSC (ms)
hidetimeout=2000

# Mostrar OSC ao iniciar
osc_on_start=yes

# Mostrar OSC ao buscar
osc_on_seek=yes

# Manter OSC visível quando pausado
keeponpause=yes

# Fade ao aparecer
fadein=yes
fadeduration=150

# Barra de progresso persistente
persistent_progress=no
persistent_buffer=no

# Timecode atual (yes) ou tempo restante (no)
timecurrent=yes

# Mostrar milissegundos
timems=no

# Barra de título da janela customizada (auto/yes/no)
window_top_bar=auto
window_title=no

# Visibilidade (auto/always/never)
visibility=auto

# Tela idle com logo
idlescreen=yes

# Mostrar tela para audio-only
audioonlyscreen=no

# Movimento mínimo do mouse para mostrar OSC (px)
minmousemove=0

# Seekbar com keyframes
seekbarkeyframes=no